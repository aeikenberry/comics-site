services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: comics
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: comics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://comics:${DB_PASSWORD:-password}@db:5432/comics
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-string-32chars}
      UPLOAD_DIR: /app/public/uploads
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_TITLE: ${NEXT_PUBLIC_SITE_TITLE:-My Comics}
      NEXT_PUBLIC_SITE_DESCRIPTION: ${NEXT_PUBLIC_SITE_DESCRIPTION:-Comic strips and gag comics}
    volumes:
      - uploads:/app/public/uploads
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads:
